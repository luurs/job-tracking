services:
  postgres:
    image: postgres:16-alpine
    container_name: job-tracking-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: job_tracking
      POSTGRES_USER: job_tracking
      POSTGRES_PASSWORD: job_tracking
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U job_tracking -d job_tracking"]
      interval: 5s
      retries: 5

volumes:
  postgres-data:
